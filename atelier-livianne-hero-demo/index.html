    <style>
      :root {
        --bg: #ffffff;
        --text: #000000;
        --hero-max: 1320px;
        --section-max: 920px;
        --measure: 62ch;
        --measure-wide: 74ch;
        --pad-x: clamp(28px, 3.8vw, 56px);
        --nav-pad-x: clamp(18px, 2.4vw, 36px);
        --nav-pad-left: clamp(10px, 1.2vw, 18px);
        --hero-copy-inset: clamp(74px, 10vw, 170px);
        --section-y: clamp(20px, 3vh, 40px);
        /* Hero "A": size caps; max-height also bounded by shell so the mark is never cropped */
        --a-mark-max-w: calc(78vw * 1.12 * 0.98 * 1.06);
        --a-mark-max-h: calc(70vh * 1.1 * 0.98 * 1.06);
        --a-shift-x: -3%;
        --hero-center-pad-t: clamp(24px, 4.5vh, 52px);
        --hero-center-pad-b: clamp(48px, 11vh, 120px);
        /* Hero copy: offsets + lift — "Decision Architecture™" parallel to "A" left foot */
        --hero-copy-base-mt: clamp(32px, 5vh, 72px);
        --hero-copy-offset: 50px;
        --hero-copy-align-lift: 0px;
        --hero-copy-shift-y: 29.5px;
        /* Height % up from mark bottom → left-foot line (tail hangs lower on the right) */
        --hero-a-left-foot-ratio: 0.21;
        --hero-label-foot-nudge: 12px;
        --hero-label-extra-lift: 18px;
        --nav-h: 72px;
        --footer-h: 40px;
        --ease-hamburger: cubic-bezier(0.4, 0, 0.2, 1);
        --dur-hamburger: 720ms;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100vh;
        max-height: 100vh;
        margin: 0;
        overflow: hidden;
        overflow-x: hidden;
        max-width: 100%;
      }

      html {
        scroll-behavior: auto;
        overscroll-behavior-y: none;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Libre Caslon Text", "Palatino Linotype", Palatino, Georgia,
          serif;
        font-size: 18px;
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: geometricPrecision;
        overflow: hidden;
        overscroll-behavior-y: none;
      }

      /* One viewport: stacked views, no page scroll */
      .app-shell {
        position: fixed;
        top: var(--nav-h);
        left: 0;
        right: 0;
        bottom: var(--footer-h);
        z-index: 1;
        max-width: 100%;
        overflow-x: hidden;
        overflow-y: hidden;
        overscroll-behavior-y: none;
      }

      @supports (overflow: clip) {
        .app-shell {
          overflow-x: clip;
          overflow-y: clip;
        }
      }

      .app-view {
        position: absolute;
        inset: 0;
        overflow: hidden;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        z-index: 0;
        transition:
          opacity var(--dur) var(--ease-out),
          visibility 0s linear var(--dur);
      }

      .app-view.is-active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        z-index: 1;
        transition:
          opacity var(--dur) var(--ease-out),
          visibility 0s;
      }

      #hero.app-view {
        max-width: 100%;
        overflow-x: hidden;
        overflow-y: hidden;
        overscroll-behavior-y: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* Minimal motion system (respects reduced motion) */
      :root {
        --ease-out: cubic-bezier(0.2, 0.8, 0.2, 1);
        --dur-fast: 180ms;
        --dur: 420ms;
        --dur-slow: 700ms;
      }

      @media (prefers-reduced-motion: reduce) {
        :root {
          --dur-fast: 0ms;
          --dur: 0ms;
          --dur-slow: 0ms;
          --dur-hamburger: 0ms;
        }

        html {
          scroll-behavior: auto;
        }

        .a-video {
          filter: none;
        }

        .a-container::after {
          background: rgba(0, 0, 0, 0.18);
        }

      }

      .hero {
        height: 100%;
        min-height: 0;
        display: grid;
        grid-template-rows: 1fr;
        padding: 0 var(--pad-x);
        max-width: 100%;
        overflow-x: hidden;
        overflow-y: hidden;
        position: relative;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: clamp(14px, 2vw, 20px);
        width: 100%;
        margin: 0;
        min-height: 72px;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 30;
        background: var(--bg);
        padding: 10px var(--nav-pad-x) 10px var(--nav-pad-left);
      }

      .nav__inner {
        width: min(1400px, 100%);
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: clamp(14px, 2vw, 20px);
        min-height: 52px;
      }

      .nav__brand {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        line-height: 0;
        padding-top: 10px;
      }

      .nav__brandLogo {
        display: block;
        height: 74px;
        width: 112px;
        max-width: none;
        opacity: 1;
        object-fit: contain;
      }

      .nav__link {
        font-size: 18px;
        font-weight: 400;
        letter-spacing: -0.006em;
        text-transform: none;
        line-height: 1;
        opacity: 1;
      }

      .nav__link:focus-visible {
        outline: 1px solid var(--text);
        outline-offset: 6px;
      }

      .nav__links {
        display: flex;
        align-items: center;
        gap: clamp(2px, 0.45vw, 8px);
        flex-wrap: nowrap;
        justify-content: flex-end;
        width: auto;
        padding-right: clamp(12px, 2vw, 28px);
      }

      .nav__toggle {
        display: none;
        border: 0;
        padding: 0;
        padding-right: 0;
        margin: 0;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
        line-height: 1;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 500;
        font-size: 14px;
        opacity: 1;
      }

      .nav__panel {
        display: none;
      }

      .center {
        width: min(var(--hero-max), 100%);
        max-width: 100%;
        margin: 0 auto;
        display: grid;
        align-content: center;
        justify-items: stretch;
        height: 100%;
        min-height: 0;
        padding-top: var(--hero-center-pad-t);
        padding-bottom: var(--hero-center-pad-b);
        overflow-x: hidden;
        overflow-y: visible;
      }

      .hero-grid {
        height: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1.02fr) minmax(0, 1fr);
        align-items: center;
        gap: clamp(24px, 3.2vw, 52px);
        min-width: 0;
        max-width: 100%;
        overflow-x: hidden;
        overflow-y: visible;
      }

      .hero-copy {
        justify-self: center;
        text-align: left;
        width: min(620px, 100%);
        max-width: none;
        z-index: 2;
        margin-left: clamp(20px, 3.2vw, 52px);
        margin-right: auto;
        margin-top: calc(var(--hero-copy-base-mt) + var(--hero-copy-offset));
        padding-left: clamp(18px, 3vw, 44px);
        padding-right: clamp(12px, 2vw, 28px);
      }

      /* Hero-only typography (do not affect other sections) */
      #hero .hero-copy {
        font-family:
          "Libre Caslon Text",
          "Iowan Old Style",
          "Palatino Linotype",
          Palatino,
          Georgia,
          serif;
        font-weight: 400;
      }

      .hero-title {
        margin: 0;
        font-weight: 400;
        letter-spacing: -0.01em;
        font-size: clamp(44px, 5.6vw, 92px);
        line-height: 1.02;
      }

      .hero-sub {
        display: none;
      }

      .hero-quote {
        margin-top: clamp(16px, 2.8vh, 34px);
        width: 100%;
        display: flex;
        flex-direction: column;
        flex-wrap: nowrap;
        justify-content: flex-start;
        align-items: flex-start;
        gap: 0;
        text-align: left;
      }

      .hero-quote__title {
        margin: 0 0 clamp(26px, 4.2vh, 46px) 0;
        font-weight: 380;
        font-size: clamp(28px, 2.5vw, 38px);
        line-height: 1.08;
        letter-spacing: -0.015em;
        max-width: 22em;
      }

      .hero-quote__line {
        display: block;
      }

      /* Keep the first headline line intact on desktop */
      @media (min-width: 861px) {
        .hero-quote__line--headline1 {
          white-space: nowrap;
        }
        .hero-quote__line--next {
          white-space: nowrap;
        }
      }

      .hero-quote__line--next {
        display: block;
        margin-top: 0.1em;
      }

      .hero-quote__sub {
        margin: 0 0 0.26em 0;
        font-weight: 400;
        font-size: clamp(18px, 1.42vw, 21px);
        color: var(--text);
        line-height: 1.44;
        letter-spacing: -0.003em;
      }

      .hero-quote__label {
        margin: 0;
        font-family: "Libre Caslon Text", Georgia, serif;
        font-weight: 400;
        font-size: clamp(18px, 1.42vw, 21px);
        line-height: 1.44;
        letter-spacing: -0.003em;
        opacity: 0.98;
      }

      .tm {
        font-size: 0.55em;
        vertical-align: super;
        line-height: 0;
        letter-spacing: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto,
          Arial, "Noto Sans", "Liberation Sans", sans-serif;
        font-weight: 500;
      }

      /* Desktop editorial polish (nav + hero balance) */
      @media (min-width: 1024px) {
        .nav__links {
          gap: clamp(42px, 3.2vw, 56px);
          padding-right: 0;
        }

        .nav__link {
          font-size: clamp(13px, 0.95vw, 15px);
          font-weight: 360;
          letter-spacing: 0.06em;
          opacity: 0.92;
        }

        .hero-quote__title {
          margin-bottom: clamp(18px, 3.2vh, 34px);
          font-weight: 360;
          line-height: 1.07;
          letter-spacing: -0.015em;
          max-width: 24em;
        }

        .hero-quote__sub {
          font-weight: 400;
          letter-spacing: -0.003em;
        }

        .hero-quote__label {
          font-weight: 400;
          letter-spacing: -0.003em;
        }
      }

      /* Desktop: refine typography balance (sections below hero) */
      @media (min-width: 1024px) {
        .section__kicker {
          font-weight: 420;
          letter-spacing: 0.2em;
        }

        #work .section__kicker,
        #model .section__kicker,
        #contact .section__kicker {
          letter-spacing: 0.18em;
        }

        .prose {
          font-weight: 420;
          line-height: 1.6;
        }

        .work__line {
          font-weight: 420;
          line-height: 1.65;
        }

        #work .work__line,
        #work .work__list li {
          font-weight: 420;
          line-height: 1.6;
          letter-spacing: -0.004em;
        }

        .about__name {
          font-weight: 600;
          letter-spacing: -0.01em;
          line-height: 1.12;
        }

        .about__role {
          font-weight: 400;
          letter-spacing: 0.032em;
        }

        .model-item__title {
          font-weight: 460;
          line-height: 1.22;
          letter-spacing: -0.008em;
        }

        .model-item__desc {
          font-weight: 420;
          line-height: 1.48;
        }

        .contact__item {
          font-weight: 420;
        }

        .contact__sub {
          font-weight: 420;
          line-height: 1.35;
        }

        .footer__inner {
          font-weight: 450;
          letter-spacing: 0.14em;
        }
      }

      /* Sections (below hero) */
      .section {
        padding: var(--section-y) var(--pad-x);
        border-top: 0;
        display: grid;
        overflow: hidden;
        height: 100%;
        min-height: 0;
        align-content: center;
      }

      .section.app-view {
        align-content: center;
      }

      .section__inner {
        width: 100%;
        max-width: var(--section-max);
        margin: 0 auto;
        padding-left: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: left;
        overflow: hidden;
        min-height: 0;
        max-height: 100%;
      }

      /* Centered section variant (does not affect hero/banner) */
      .section--center .section__inner {
        justify-items: center;
        text-align: left;
      }

      .section__kicker {
        margin: 0 0 clamp(12px, 1.8vh, 22px);
        font-size: 14px;
        font-weight: 420;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--text);
        align-self: center;
        text-align: center;
      }

      #work .section__kicker,
      #model .section__kicker,
      #contact .section__kicker {
        font-size: clamp(16px, 2vw, 24px);
        letter-spacing: 0.2em;
        margin-bottom: clamp(26px, 3.5vh, 48px);
      }

      .model-grid,
      .contact__item,
      .footer__inner {
        justify-self: center;
      }

      .prose {
        width: min(var(--measure-wide), 100%);
        font-size: clamp(16px, 1.65vw, 20px);
        line-height: 1.62;
        font-weight: 420;
        color: var(--text);
        text-align: left;
      }

      .prose p {
        margin: 0;
      }

      .prose p + p {
        margin-top: 10px;
      }

      /* Work section centered narrow editorial block */
      .section--centered .section__inner {
        display: grid;
      }

      .section--centered .prose {
        text-align: center;
      }

      .work {
        width: min(72ch, 100%);
        display: grid;
        gap: clamp(14px, 2.8vh, 22px);
      }

      .work__line {
        margin: 0;
        font-size: clamp(13px, 1.25vw, 16px);
        line-height: 1.68;
        font-weight: 420;
      }

      .work__spacer {
        height: clamp(10px, 2.8vh, 18px);
      }

      .work__list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .work__list li {
        margin: 0;
        padding: 0;
      }

      /* WORK: one vertical rhythm (prose `p + p` margin was doubling flex gap) */
      #work {
        --work-stack: clamp(11px, 1.45vh, 15px);
        --work-block: clamp(20px, 2.5vh, 30px);
      }

      #work .problem-grid.prose p {
        margin: 0;
      }

      #work .problem-grid.prose p + p {
        margin-top: 0;
      }

      #work .work__line,
      #work .work__list li {
        font-size: clamp(16px, 1.65vw, 20px);
        line-height: 1.55;
        font-weight: 420;
        letter-spacing: 0;
      }

      #work .work__list {
        display: flex;
        flex-direction: column;
        gap: var(--work-stack);
        margin: 0;
        padding: 0;
        list-style: none;
        width: 100%;
        max-width: 100%;
        align-items: center;
      }

      #work .problem-col {
        gap: var(--work-block);
      }

      #work .problem-block {
        display: flex;
        flex-direction: column;
        gap: var(--work-stack);
        align-items: center;
        width: 100%;
      }

      #work .problem-block .work__spacer {
        display: none;
      }

      /* THE PROBLEM: centered 2x2 grid */
      .problem-grid {
        width: min(var(--section-max), 100%);
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        column-gap: clamp(28px, 4vw, 56px);
        align-self: center;
        align-items: start;
        text-align: center;
      }

      .problem-col {
        display: flex;
        flex-direction: column;
        gap: clamp(14px, 1.8vh, 22px);
        align-items: center;
        align-self: stretch;
        justify-content: flex-start;
      }

      .problem-block {
        width: 100%;
        min-width: 0;
      }


      .problem-block .work__spacer {
        height: clamp(8px, 1.2vh, 14px);
      }

      /* ===================================================
         ABOUT SECTION ONLY — IMPROVED DESIGN
         =================================================== */

      #about {
        padding-top: clamp(40px, 5vh, 80px);
        box-sizing: border-box;
      }

      @media (min-width: 992px) {

        #about .section__inner {
          height: calc(100vh - 80px);
          display: flex;
          align-items: stretch;
        }

        #about .about {
          display: grid;
          grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
          gap: clamp(60px, 8vw, 100px);
          width: 100%;
          height: 100%;
          align-items: start;
        }

        /* Left Image */
        #about .about__image {
          display: block;
          width: 100%;
          height: auto;
          margin: 0;
          align-self: start;
          position: sticky;
          top: 0;
          border-radius: clamp(4px, 0.5vw, 8px);
          box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        /* Right Content */
        #about .about__content {
          min-width: 0;
          min-height: 0;
          padding-top: clamp(40px, 4vh, 60px);
          overflow-y: auto;
          overflow-x: hidden;
          padding-right: clamp(16px, 2vw, 32px);
        }

        /* Improved Scrollbar */
        #about .about__content::-webkit-scrollbar {
          width: 5px;
        }

        #about .about__content::-webkit-scrollbar-track {
          background: transparent;
        }

        #about .about__content::-webkit-scrollbar-thumb {
          background: rgba(0, 0, 0, 0.12);
          border-radius: 3px;
        }

        #about .about__content::-webkit-scrollbar-thumb:hover {
          background: rgba(0, 0, 0, 0.22);
        }

        #about .prose {
          margin-bottom: clamp(32px, 4vh, 56px);
        }

        #about .prose p:last-child {
          margin-bottom: 0;
        }
      }

      @media (max-width: 991px) {

        #about {
          padding-top: clamp(28px, 4vh, 40px);
        }

        #about .section__inner {
          height: auto;
        }

        #about .about {
          display: block;
        }

        #about .about__image {
          position: static;
          width: 100%;
          margin-bottom: clamp(28px, 4vh, 40px);
          border-radius: clamp(3px, 0.4vw, 6px);
          box-shadow: 0 1px 4px rgba(0, 0, 0, 0.03);
        }

        #about .about__content {
          overflow: visible;
          padding-right: 0;
        }
      }

      /* About (image + text, clean, no masking) */
      .about {
        width: min(var(--section-max), 100%);
        display: flex;
        gap: clamp(24px, 3.2vw, 52px);
        justify-content: center;
        align-items: center;
        align-self: center;
        min-height: 0;
        max-height: 100%;
        isolation: isolate;
        position: relative;
      }

      .about__image {
        flex: 0 0 50%;
        width: 100%;
        max-height: 52vh;
        height: auto;
        display: block;
        object-fit: cover;
        aspect-ratio: 3 / 4;
        /* Slight downward bias: tall sources + cover still read "top" without shearing hair */
        object-position: 50% 14%;
        border: 0;
        border-radius: 0;
        background: var(--bg);
        justify-self: start;
        flex-shrink: 0;
      }

      #about.section.app-view {
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior-y: contain;
        -webkit-overflow-scrolling: touch;
        align-content: center;
      }

      /* Block stays centered in the shell; copy reads left */
      #about .section__inner {
        overflow: visible;
        max-height: none;
        text-align: left;
        justify-content: center;
        align-items: center;
      }

      #about .about {
        text-align: left;
      }

      #about .about__content {
        justify-items: start;
        text-align: left;
      }

      #about .about .prose {
        text-align: left;
      }

      .about__content {
        flex: 0 0 50%;
        width: 100%;
        display: grid;
        align-content: center;
